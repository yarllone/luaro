<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luaro</title>
  <style>
    :root {
      --bg: #000000;
      --surface: rgba(255,255,255,0.05);
      --surface-hover: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.1);
      --border-strong: rgba(255,255,255,0.15);
      --text-primary: #f5f5f7;
      --text-secondary: #a1a1a6;
      --text-tertiary: #6e6e73;
      --text-link: #2997ff;
      --text-link-hover: #61b8ff;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, "SF Pro Display", "SF Pro Text", BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.5rem;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Radial glow behind card */
    body::before {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      translate: -50% -50%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 390px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      overflow: hidden;
      animation: appear 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    }

    @keyframes appear {
      from { opacity: 0; transform: scale(0.97) translateY(12px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ── Header ── */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 2rem 2rem;
      text-align: center;
    }

    .logo-wrap {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      overflow: hidden;
      flex-shrink: 0;
      margin-bottom: 1rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }

    .logo-wrap img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .app-name {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      line-height: 1;
    }

    .app-tagline {
      margin-top: 0.4rem;
      font-size: 0.8125rem;
      color: var(--text-tertiary);
      font-weight: 400;
      letter-spacing: 0;
    }

    /* ── Sections ── */
    .section {
      border-top: 1px solid var(--border);
    }

    /* ── List rows ── */
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.875rem 1.25rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s ease;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
    }

    .row:last-child {
      border-bottom: none;
    }

    .row:hover {
      background: var(--surface-hover);
    }

    .row-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .row-icon {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .row-icon svg {
      width: 16px;
      height: 16px;
    }

    .icon-blue   { background: #1c3a5e; }
    .icon-gray   { background: #2a2a2e; }
    .icon-green  { background: #1a3a2a; }
    .icon-orange { background: #3a2a1a; }
    .icon-purple { background: #2a1a3a; }

    .row-label {
      font-size: 0.9375rem;
      font-weight: 400;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .row-meta {
      font-size: 0.875rem;
      color: var(--text-secondary);
      letter-spacing: -0.01em;
    }

    .row-chevron {
      color: var(--text-tertiary);
      flex-shrink: 0;
      margin-left: 0.5rem;
    }

    .row-right {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    /* ── Info rows (label + value) ── */
    .info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.875rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      font-size: 0.9375rem;
      color: var(--text-primary);
      font-weight: 400;
      letter-spacing: -0.01em;
    }

    .info-value {
      font-size: 0.9375rem;
      color: var(--text-secondary);
      letter-spacing: -0.01em;
      text-align: right;
    }

    .info-value a {
      color: var(--text-link);
      text-decoration: none;
      transition: color 0.15s ease;
    }

    .info-value a:hover {
      color: var(--text-link-hover);
    }

    /* ── Section label ── */
    .section-label {
      padding: 1.25rem 1.25rem 0.4rem;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--text-tertiary);
    }

    /* ── Footer ── */
    .footer {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: var(--text-tertiary);
      text-align: center;
      letter-spacing: 0;
      animation: appear 0.7s 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- Header: logo + name -->
    <div class="header">
      <div class="logo-wrap">
        <img src="Logo%20v4.jpg" alt="Luaro" width="72" height="72" />
      </div>
      <div class="app-name">Luaro</div>
      <div class="app-tagline">App information &amp; legal</div>
    </div>

    <!-- Legal links -->
    <div class="section">
      <a class="row" href="https://terms.luaro.app" target="_blank" rel="noopener">
        <div class="row-left">
          <div class="row-icon icon-blue">
            <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="2" stroke="#4da3ff" stroke-width="1.4"/><path d="M5 8h6M5 5.5h6M5 10.5h4" stroke="#4da3ff" stroke-width="1.4" stroke-linecap="round"/></svg>
          </div>
          <span class="row-label">Terms of Use</span>
        </div>
        <div class="row-right">
          <svg class="row-chevron" width="7" height="12" viewBox="0 0 7 12" fill="none"><path d="M1 1l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </a>
      <a class="row" href="https://privacy.luaro.app" target="_blank" rel="noopener">
        <div class="row-left">
          <div class="row-icon icon-gray">
            <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5" stroke="#a1a1a6" stroke-width="1.4"/><path d="M8 7v4M8 5.5v.5" stroke="#a1a1a6" stroke-width="1.4" stroke-linecap="round"/></svg>
          </div>
          <span class="row-label">Privacy Policy</span>
        </div>
        <div class="row-right">
          <svg class="row-chevron" width="7" height="12" viewBox="0 0 7 12" fill="none"><path d="M1 1l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </a>
      <a class="row" href="https://luaro-help.notion.site/Luaro-Setup-Guide-36e5ecd56edf80b4ac8cd7508637b4c9?pvs=74" target="_blank" rel="noopener">
        <div class="row-left">
          <div class="row-icon icon-orange">
            <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5" stroke="#ff9f40" stroke-width="1.4"/><path d="M6.5 6.5C6.5 5.7 7.1 5 8 5s1.5.7 1.5 1.5c0 1-1.5 1.5-1.5 2.5M8 11v.5" stroke="#ff9f40" stroke-width="1.4" stroke-linecap="round"/></svg>
          </div>
          <span class="row-label">Help &amp; Documentation</span>
        </div>
        <div class="row-right">
          <svg class="row-chevron" width="7" height="12" viewBox="0 0 7 12" fill="none"><path d="M1 1l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </a>
    </div>

    <!-- Contact & Developer -->
    <div class="section">
      <div class="info-row">
        <span class="info-label">Contact</span>
        <span class="info-value"><a href="mailto:support@luaro.app">support@luaro.app</a></span>
      </div>
      <div class="info-row">
        <span class="info-label">Developer</span>
        <span class="info-value">Yaroslav Lishchynskyi</span>
      </div>
    </div>

  </div>

  <div class="footer">© 2026 Yaroslav Lishchynskyi. All rights reserved.</div>

</body>
</html>
